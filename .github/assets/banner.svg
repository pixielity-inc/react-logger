<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="50%" style="stop-color:#eab308"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="loggerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#22c55e" opacity="0.05"/>
  <circle cx="1100" cy="300" r="200" fill="#eab308" opacity="0.05"/>
  <circle cx="600" cy="400" r="180" fill="#ef4444" opacity="0.03"/>
  
  <!-- Console/terminal icon -->
  <g transform="translate(150, 200)">
    <rect x="-50" y="-35" width="100" height="70" rx="6" fill="none" stroke="url(#loggerGradient)" stroke-width="3" opacity="0.7"/>
    <text x="-35" y="-5" font-family="monospace" font-size="14" fill="#22c55e" opacity="0.9">&gt;_</text>
    <line x1="-35" y1="15" x2="35" y2="15" stroke="url(#loggerGradient)" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Log levels indicator -->
  <g transform="translate(1050, 200)">
    <circle cx="-20" cy="-20" r="8" fill="#22c55e" opacity="0.8"/>
    <circle cx="0" cy="-20" r="8" fill="#3b82f6" opacity="0.8"/>
    <circle cx="20" cy="-20" r="8" fill="#eab308" opacity="0.8"/>
    <circle cx="-10" cy="5" r="8" fill="#ef4444" opacity="0.8"/>
    <circle cx="10" cy="5" r="8" fill="#dc2626" opacity="0.8"/>
    <text x="0" y="35" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">levels</text>
  </g>
  
  <!-- Main title -->
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">
    @abdokouta/react-logger
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8">
    Flexible Logging System for React
  </text>
  
  <!-- Tagline with gradient -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="url(#accentGradient)">
    Formatters • Transporters • Log Levels • React Hooks
  </text>
  
  <!-- Bottom accent line -->
  <rect x="400" y="320" width="400" height="4" rx="2" fill="url(#accentGradient)" opacity="0.8"/>
</svg>
